services:
  mysql:
    image: mysql:8.0
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
      --binlog-row-metadata=FULL
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: replication_test
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ppassword"]
      interval: 2s
      timeout: 2s
      retries: 30
